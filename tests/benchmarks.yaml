    expected_answer: "A lossless decomposition occurs when a relation is decomposed into smaller relations such that the original relation can be exactly reconstructed by joining the decomposed relations. No information is lost and no spurious tuples are introduced. This usually requires that the common attributes form a superkey for at least one decomposed relation."
